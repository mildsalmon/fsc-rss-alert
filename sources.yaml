- id: mofa
  slug: mofa-sanctions
  name: MOFA 독자제재
  mechanism: rss
  parser_version: 1
  channel_id:
  interval_minutes: 30
  url: https://www.mofa.go.kr/www/brd/rss.do?brdId=235
  params:
    fetch_profile: mofa_cookie_gate
  empty_result_policy: error

- id: lawreq
  slug: fsc-lawreq
  name: 금융위 법령해석
  mechanism: datatables
  parser_version: 1
  channel_id:
  interval_minutes: 30
  url: https://better.fsc.go.kr/fsc_new/replyCase/selectReplyCaseLawreqList.do
  params:
    stNo: 11
    muNo: 85
    muGpNo: 75
    item_id_field: lawreqIdx
    title_field: title
    ordering_field: lawreqNumber
    published_detail_label: 회신일
  list_path: data
  detail_url: https://better.fsc.go.kr/fsc_new/replyCase/LawreqDetail.do?stNo=11&muNo=85&muGpNo=75&lawreqIdx={id}
  empty_result_policy: error

- id: opinion
  slug: fsc-opinion
  name: 금융위 비조치의견서
  mechanism: datatables
  parser_version: 1
  channel_id:
  interval_minutes: 30
  url: https://better.fsc.go.kr/fsc_new/replyCase/selectReplyCaseOpinionList.do
  params:
    stNo: 11
    muNo: 84
    muGpNo: 75
    item_id_field: opinionIdx
    title_field: title
    ordering_field: opinionNumber
    published_detail_label: 회신일
  list_path: data
  detail_url: https://better.fsc.go.kr/fsc_new/replyCase/OpinionDetail.do?stNo=11&muNo=84&muGpNo=75&opinionIdx={id}
  empty_result_policy: error

- id: fss
  slug: fss-press
  name: 금감원 보도자료
  mechanism: html
  parser_version: 1
  channel_id:
  interval_minutes: 30
  url: https://www.fss.or.kr/fss/bbs/B0000188/list.do?menuNo=200218
  params:
    item_id_query_param: nttId
    link_href_contains: /fss/bbs/B0000188/view.do
    title_cell_index: 1
    date_cell_index: 3
  empty_result_policy: error

- id: fsc-legislation
  slug: fsc-legislation
  name: 금융위 입법예고/규정변경예고
  mechanism: html
  parser_version: 1
  channel_id:
  interval_minutes: 30
  url: https://www.fsc.go.kr/po040301
  params:
    row_tag: li
    item_id_query_param: noticeId
    link_href_contains: po040301/view
    published_regex: (?P<date>\d{4}-\d{2}-\d{2})$
  empty_result_policy: error

- id: fiu-sanctions
  slug: fiu-sanctions
  name: FIU 제재공시
  mechanism: json_board
  parser_version: 1
  channel_id:
  interval_minutes: 30
  url: https://www.kofiu.go.kr/cmn/board/selectBoardListFile.do
  params:
    seCd: "0022"
    page: 1
    size: 10
    item_id_field: ntcnYardOrdrNo
    title_field: ntcnYardSjNm
    published_field: ntcnYardRgiDt
    ordering_field: ntcnYardOrdrNo
  list_path: result
  detail_url: https://www.kofiu.go.kr/kor/notification/sanctions_view.do?ntcnYardOrdrNo={id}&seCd=0022
  empty_result_policy: error

- id: ofac-sdn
  slug: ofac-sdn
  name: OFAC SDN
  mechanism: bulk
  parser_version: 1
  channel_id:
  interval_minutes: 30
  url: https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.XML
  params:
    published_timezone: UTC
    timeout_seconds: 60
  detail_url: https://sanctionssearch.ofac.treas.gov/Details.aspx?id={id}
  empty_result_policy: error
